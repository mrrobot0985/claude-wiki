name: Feature Request
description: Suggest a new capability or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What concrete problem does this solve today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behaviour you would like to see.
    validations:
      required: true
  - type: textarea
    id: criteria
    attributes:
      label: Acceptance criteria
      description: How would we verify this is complete and correct?
      placeholder: |
        - [ ] New flag `--dry-run` works on `compile`
        - [ ] Tests cover happy path and error path
        - [ ] `make all` passes
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
