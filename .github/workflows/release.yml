name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          TAG_SHA=$(git rev-parse ${{ github.ref_name }})
          if git branch -r --contains "$TAG_SHA" | grep -q "origin/main"; then
            echo "Tag ${{ github.ref_name }} ($TAG_SHA) is on main — proceeding."
          else
            echo "Tag ${{ github.ref_name }} ($TAG_SHA) is NOT on main. Aborting release."
            exit 1
          fi

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(grep -m1 '^version = ' pyproject.toml | sed 's/^version = "\(.*\)"$/\1/')
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME (version $TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION). Aborting."
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches package version $PKG_VERSION."

  build:
    needs: verify-main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Build package
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/claude-wiki/${{ github.ref_name }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download artifacts
        uses: actions/download-artifact@b14cf4c92620c250e1c074ab0a5800e37df86765 # v4.2.0
        with:
          name: dist
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"

      - name: Publish to PyPI
        run: uv publish dist/*
