name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          TAG_SHA=$(git rev-parse ${{ github.ref_name }})
          if git branch -r --contains "$TAG_SHA" | grep -q "origin/main"; then
            echo "Tag ${{ github.ref_name }} ($TAG_SHA) is on main — proceeding."
          else
            echo "Tag ${{ github.ref_name }} ($TAG_SHA) is NOT on main. Aborting release."
            exit 1
          fi

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(grep -m1 '^version = ' pyproject.toml | sed 's/^version = "\(.*\)"$/\1/')
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME (version $TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION). Aborting."
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches package version $PKG_VERSION."

      - name: Verify tag is signed and verified
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Peel to the commit: for an annotated tag, `git rev-parse <tag>` returns
          # the tag *object* sha, not the commit sha, which the commits API rejects
          # (HTTP 422). `^{commit}` resolves to the commit for both annotated and
          # lightweight tags.
          REF_SHA=$(git rev-parse "$GITHUB_REF_NAME^{commit}")
          TAG_OBJ=$(git rev-parse "$GITHUB_REF_NAME^{tag}" 2>/dev/null || true)
          if [ -n "$TAG_OBJ" ] && [ "$TAG_OBJ" != "$REF_SHA" ]; then
            VERIFIED=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${TAG_OBJ}" --jq '.verification.verified // empty')
          else
            VERIFIED=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${REF_SHA}" --jq '.commit.verification.verified // empty')
          fi
          if [ "$VERIFIED" != "true" ]; then
            echo "Tag $GITHUB_REF_NAME is not verified (verified='$VERIFIED'). Refusing to release."
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME is signed and verified."

  build:
    needs: verify-main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Build package
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

  smoke:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Download artifacts
        uses: actions/download-artifact@b14cf4c92620c250e1c074ab0a5800e37df86765 # v4.2.0
        with:
          name: dist
          path: dist/

      - name: Install wheel in a clean venv
        run: |
          uv venv /tmp/smoke-wheel
          uv pip install --python /tmp/smoke-wheel/bin/python dist/claude_wiki-*.whl

      - name: Exercise console entry points
        run: |
          /tmp/smoke-wheel/bin/claude-wiki --version
          /tmp/smoke-wheel/bin/claude-wiki --help
          # Hook entry point is installed and parses args (unknown event exits 1).
          set +e
          /tmp/smoke-wheel/bin/claude-wiki-hook BogusEvent > /tmp/hook.out 2>&1
          rc=$?
          set -e
          test "$rc" -ne 0
          grep -q "Unknown hook event" /tmp/hook.out

      - name: Bootstrap a repo with the wheel-installed CLI
        env:
          XDG_DATA_HOME: /tmp/xdg-data
        run: |
          git config --global user.email "smoke@example.com"
          git config --global user.name "smoke"
          REPO=$(mktemp -d)
          git -C "$REPO" init -q
          git -C "$REPO" config user.email "smoke@example.com"
          git -C "$REPO" config user.name "smoke"
          echo "hello" > "$REPO/README.md"
          git -C "$REPO" add .
          git -C "$REPO" commit -q -m "chore: initial commit"
          /tmp/smoke-wheel/bin/claude-wiki init --path "$REPO"
          test -f "$REPO/.claude-wiki.lock"
          test -f "$REPO/.claude/settings.local.json"

      - name: Install sdist in a clean venv
        run: |
          uv venv /tmp/smoke-sdist
          uv pip install --python /tmp/smoke-sdist/bin/python dist/claude_wiki-*.tar.gz

      - name: Smoke the sdist install
        run: |
          /tmp/smoke-sdist/bin/claude-wiki --version
          /tmp/smoke-sdist/bin/claude-wiki --help

  publish:
    needs: smoke
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/claude-wiki/${{ github.ref_name }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download artifacts
        uses: actions/download-artifact@b14cf4c92620c250e1c074ab0a5800e37df86765 # v4.2.0
        with:
          name: dist
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"

      - name: Publish to PyPI
        run: uv publish dist/*

  github_release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1d1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download dist artifacts
        uses: actions/download-artifact@b14cf4c92620c250e1c074ab0a5800e37df86765 # v4.2.0
        with:
          name: dist
          path: dist/

      - name: Extract release notes from CHANGELOG
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { insec = 1; print; next }
            insec && /^## \[/ { exit }
            insec { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          test -s /tmp/release-notes.md
          echo "--- release notes ---"
          cat /tmp/release-notes.md

      - name: Create GitHub Release with artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --target main \
            --notes-file /tmp/release-notes.md \
            dist/claude_wiki-*.whl dist/claude_wiki-*.tar.gz
