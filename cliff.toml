# git-cliff configuration for claude-wiki
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file.

"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}
"""
trim = true
render_always = true
output = "CHANGELOG.md"
postprocessors = [
    { pattern = '<REPO>', replace = "https://github.com/mrrobot0985/claude-wiki" },
]
footer = """
## Earlier Work

See git log for the full commit history prior to formal changelog adoption.
"""

[git]
conventional_commits = true
filter_unconventional = true
require_conventional = false
split_commits = false
protect_breaking_commits = true
sort_commits = "oldest"

commit_preprocessors = [
    { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/mrrobot0985/claude-wiki/issues/${2}))" },
]

commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^refactor", group = "Changed" },
    { message = "^docs", group = "Documentation" },
    { message = "^doc", group = "Documentation" },
    { message = "^ci", group = "Maintenance" },
    { message = "^chore", group = "Maintenance" },
    { message = "^build", group = "Build" },
    { message = "^test", group = "Testing" },
    { message = "^perf", group = "Performance" },
    { message = "^style", group = "Style" },
    { message = "^revert", group = "Reverted" },
    { body = ".*security", group = "Security" },
    { message = ".*", group = "Other" },
]

filter_commits = false
fail_on_unmatched_commit = false
link_parsers = []
use_branch_tags = false
topo_order = false
topo_order_commits = true
recurse_submodules = false
